services:
  db:
    image: pgvector/pgvector:pg16
    container_name: uzbekmentor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uzbekmentor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uzbekmentor_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-uzbekmentor}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uzbekmentor} -d ${POSTGRES_DB:-uzbekmentor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: uzbekmentor-backend
    restart: unless-stopped
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-UzbekMentorAI}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://uzbekmentor:uzbekmentor_dev_password@db:5432/uzbekmentor}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_URL: ${ANTHROPIC_API_URL:-https://api.anthropic.com/v1/messages}
      ANTHROPIC_API_VERSION: ${ANTHROPIC_API_VERSION:-2023-06-01}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-1600}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Asia/Tashkent}
      MONTHLY_INGEST_HOUR: ${MONTHLY_INGEST_HOUR:-3}
      MONTHLY_INGEST_MINUTE: ${MONTHLY_INGEST_MINUTE:-0}
      INGEST_BATCH_SIZE: ${INGEST_BATCH_SIZE:-8}
      HF_HOME: /root/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    container_name: uzbekmentor-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  hf_cache:
